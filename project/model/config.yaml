# ──────────────────────────────────────────────────
# 矢印の色分け設定
# edge_color_key: relations の attributes 内の
#                 どのキーを色分けに使うかを指定する
# 例）電気系 → voltage / 情報系 → bandwidth
# ──────────────────────────────────────────────────
edge_color_key: voltage

edge_colors:
  12V: "#4A90D9"   # 青：低圧系
  24V: "#E05C2A"   # 橙：高圧系
  default: "#999999"  # 上記に該当しない値はグレー

# ──────────────────────────────────────────────────
# ノードスタイル
# type_styles: objects の type キーに対応
# type キーが存在しない、または一致しない場合は
# default スタイルが適用される
# ──────────────────────────────────────────────────
type_styles:
  PowerSupply:
    fill_color: "#DAE8FC"
    stroke_color: "#6C8EBF"
  Switch:
    fill_color: "#D5E8D4"
    stroke_color: "#82B366"
  Light:
    fill_color: "#FFF2CC"
    stroke_color: "#D6B656"
  HVAC:
    fill_color: "#F8CECC"
    stroke_color: "#B85450"
  Panel:
    fill_color: "#E1D5E7"
    stroke_color: "#9673A6"
  default:
    fill_color: "#F5F5F5"
    stroke_color: "#666666"

# ──────────────────────────────────────────────────
# レイアウト設定（最長路ランク）
#
# 列（rank）の決め方:
#   - ソース（to に一度も出ない）     → 最左列 rank=0
#   - シンク（from に一度も出ない）   → 最右列 rank=R_max
#   - 未接続（リレーションに未登場）  → シンクと同じ最右列
#   - 中間（from かつ to）            → 最長路で 0 < rank < R_max
#   すべての辺で rank(from) < rank(to) となるよう配置する
#
# component_mode:
#   global        … 全体で 1 つの R_max（全シンクが同じ最右列）
#   per_component … 連結成分ごとに列ブロックを横に並べる
# ──────────────────────────────────────────────────
layout:
  direction: LR           # LR: 左→右 / TB: 上→下
  component_mode: global  # global | per_component
  node_width: 120
  node_height: 60
  spacing_x: 80
  spacing_y: 50         # 最右列にノードが並ぶためやや広め
  margin: 40